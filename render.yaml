services:
  - type: web
    name: my-flask-app
    env: python
    region: singapore     # gần Việt Nam nhất
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0