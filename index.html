<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Roster Month</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-900: #04342C;
    --teal-800: #085041;
    --teal-700: #0F6E56;
    --teal-500: #1D9E75;
    --teal-300: #5DCAA5;
    --teal-100: #9FE1CB;
    --teal-50:  #E1F5EE;
    --green-100: #C0DD97;
    --green-800: #27500A;
    --blue-100:  #B5D4F4;
    --blue-800:  #0C447C;
    --gray-50:   #F8FAFC;
    --gray-100:  #F1EFE8;
    --gray-200:  #E2E8F0;
    --gray-400:  #94A3B8;
    --gray-600:  #5F5E5A;
    --gray-800:  #1E293B;
    --amber-100: #FAC775;
    --amber-800: #633806;
    --red-100:   #F7C1C1;
    --red-800:   #791F1F;
    --white: #ffffff;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    font-family: var(--font);
    background: var(--gray-100);
    min-height: 100vh;
    color: var(--gray-800);
    font-size: 14px;
  }

  /* ── TOP NAV ── */
  .topbar {
    background: var(--teal-800);
    padding: 0 16px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
  }
  .btn-home:hover { background: rgba(255,255,255,0.22); }
  .btn-home svg { width: 15px; height: 15px; }

  .page-title {
    color: var(--white);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--mono);
    background: rgba(255,255,255,0.15);
    color: var(--teal-50);
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* ── SUBBAR ── */
  .subbar {
    background: var(--teal-700);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }

  .subbar-stats { display: flex; gap: 16px; }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--teal-50);
    font-size: 12px;
  }
  .stat-item svg { width: 13px; height: 13px; opacity: 0.8; }

  .active-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--teal-300);
    display: inline-block;
    margin-right: 4px;
  }

  /* ── LEGEND ── */
  .legend-bar {
    background: var(--teal-900);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--teal-100); }
  .legend-dot { width: 11px; height: 11px; border-radius: 3px; }

  /* ── SEARCH & FILTERS ── */
  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    color: var(--gray-400);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 7px 10px 7px 32px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--gray-800);
    background: var(--gray-50);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--teal-500); background: var(--white); }
  .search-input::placeholder { color: var(--gray-400); }

  .filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 12px;
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--font);
    color: var(--gray-600);
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.2s, color 0.2s;
  }
  .filter-btn:hover { border-color: var(--teal-500); color: var(--teal-700); }
  .filter-btn svg { width: 13px; height: 13px; }

  /* ── TABLE ── */
  .table-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--white);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }

  /* Column widths */
  col.col-no    { width: 30px; }
  col.col-id    { width: 44px; }
  col.col-name  { width: 90px; }
  col.col-day   { width: 34px; }

  thead tr {
    background: var(--teal-800);
  }
  thead th {
    color: var(--teal-100);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 9px 4px;
    text-align: center;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  thead th:first-child { text-align: left; padding-left: 12px; border-right: 1px solid rgba(255,255,255,0.08); }
  thead th.col-today { background: var(--teal-500); color: var(--white); }
  thead th.col-weekend { background: rgba(0,0,0,0.15); color: var(--teal-300); }

  /* Subheader with date numbers */
  .date-row th {
    background: var(--teal-900);
    color: var(--teal-300);
    font-size: 10px;
    font-family: var(--mono);
    padding: 4px 4px;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
  }
  .date-row th.col-today { background: var(--teal-700); color: var(--white); }
  .date-row th.col-weekend { color: var(--teal-100); opacity: 0.6; }

  /* Body rows */
  tbody tr {
    border-bottom: 1px solid var(--gray-100);
    transition: background 0.12s;
  }
  tbody tr:nth-child(even) { background: var(--gray-50); }
  tbody tr:nth-child(odd)  { background: var(--white); }
  tbody tr:hover { background: var(--teal-50); }

  td {
    padding: 6px 4px;
    text-align: center;
    vertical-align: middle;
    border-right: 1px solid var(--gray-100);
    font-size: 12px;
    color: var(--gray-600);
  }
  td:first-child {
    text-align: left;
    padding-left: 12px;
    border-right: 2px solid var(--gray-200);
  }

  .row-no {
    font-size: 10px;
    color: var(--gray-400);
    font-family: var(--mono);
  }
  .row-id {
    font-size: 10px;
    color: var(--gray-400);
    font-family: var(--mono);
  }

  .staff-name {
    font-weight: 600;
    font-size: 12px;
    color: var(--teal-800);
    line-height: 1.2;
  }
  .staff-sub {
    font-size: 10px;
    color: var(--gray-400);
    margin-top: 1px;
  }

  /* Shift badges */
  .shift {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0;
  }
  .s-m  { background: var(--green-100); color: var(--green-800); }
  .s-e  { background: var(--blue-100);  color: var(--blue-800); }
  .s-n  { background: #D8B4FE;          color: #4C1D95; }
  .s-off{ background: var(--gray-100);  color: var(--gray-400); }
  .s-al { background: var(--amber-100); color: var(--amber-800); }
  .s-sick{ background: var(--red-100); color: var(--red-800); }

  td.today-col { background: rgba(29,158,117,0.06); }
  td.weekend-col { background: rgba(241,239,232,0.6); }

  /* ── FOOTER ── */
  .footer {
    background: var(--white);
    border-top: 1px solid var(--gray-200);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer-info { font-size: 11px; color: var(--gray-400); }
  .footer-info strong { color: var(--gray-600); }

  .btn-export {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--teal-700);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-export:hover { background: var(--teal-800); }
  .btn-export svg { width: 13px; height: 13px; }

  /* scrollbar */
  .table-container::-webkit-scrollbar { height: 4px; }
  .table-container::-webkit-scrollbar-track { background: var(--gray-100); }
  .table-container::-webkit-scrollbar-thumb { background: var(--teal-300); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP NAVIGATION -->
<div class="topbar">
  <div class="topbar-left">
    <a href="#" class="btn-home" onclick="history.back();return false;">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Home
    </a>
    <span class="page-title">Roster Month</span>
  </div>
  <div class="topbar-right">
    <span class="badge">26/05 – 25/07/2026</span>
  </div>
</div>

<!-- SUBBAR -->
<div class="subbar">
  <div class="subbar-stats">
    <span class="stat-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20H5a2 2 0 01-2-2V7a2 2 0 012-2h14a2 2 0 012 2v11a2 2 0 01-2 2z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16 3v4M8 3v4M3 11h18"/></svg>
      Week 21
    </span>
    <span class="stat-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20H7a2 2 0 01-2-2V5a2 2 0 012-2h10a2 2 0 012 2v13a2 2 0 01-2 2z"/><circle cx="12" cy="10" r="3"/></svg>
      42 Staff
    </span>
  </div>
  <span class="stat-item"><span class="active-dot"></span>Active</span>
</div>

<!-- LEGEND -->
<div class="legend-bar">
  <span class="legend-item"><span class="legend-dot" style="background:var(--green-100)"></span>Morning (M)</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--blue-100)"></span>Evening (E)</span>
  <span class="legend-item"><span class="legend-dot" style="background:#D8B4FE"></span>Night (N)</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--amber-100)"></span>Annual Leave (AL)</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--red-100)"></span>Sick (S)</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--gray-100)"></span>Off (-)</span>
</div>

<!-- SEARCH & FILTER TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" type="search" placeholder="Search staff name or ID…" id="searchInput" oninput="filterRows()">
  </div>
  <button class="filter-btn">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4h18M7 8h10M11 12h2"/></svg>
    Filter
  </button>
</div>

<!-- ROSTER TABLE -->
<div class="table-container">
<table id="rosterTable">
  <colgroup>
    <col class="col-no">
    <col class="col-id">
    <col class="col-name">
    <!-- Fri-Mon (26-30 May) -->
    <col class="col-day"><col class="col-day"><col class="col-day"><col class="col-day"><col class="col-day">
    <!-- Tue-Sun (1-7 Jun) -->
    <col class="col-day"><col class="col-day"><col class="col-day"><col class="col-day"><col class="col-day"><col class="col-day"><col class="col-day">
  </colgroup>
  <thead>
    <tr>
      <th colspan="3" style="text-align:left;padding-left:12px;">E.Name / ID</th>
      <th>Fri</th><th>Sat</th><th>Sun</th><th>Mon</th><th class="col-today">Tue</th>
      <th>Wed</th><th>Thu</th><th>Fri</th><th class="col-weekend">Sat</th><th class="col-weekend">Sun</th><th>Mon</th><th>Tue</th>
    </tr>
    <tr class="date-row">
      <th colspan="3"></th>
      <th>26</th><th class="col-weekend">27</th><th class="col-weekend">28</th><th>29</th><th class="col-today">30</th>
      <th>1</th><th>2</th><th>3</th><th class="col-weekend">4</th><th class="col-weekend">5</th><th>6</th><th>7</th>
    </tr>
  </thead>
  <tbody id="rosterBody">
  </tbody>
</table>
</div>

<!-- FOOTER -->
<div class="footer">
  <span class="footer-info">Showing <strong id="rowCount">42</strong> staff &nbsp;·&nbsp; Month 7 &nbsp;·&nbsp; Updated today</span>
  <button class="btn-export">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/></svg>
    Export
  </button>
</div>

</script>
</body>
</html>
