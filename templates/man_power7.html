<!doctype html>
<html lang="en">
  <head>
    <head>
      <link rel="manifest" href="/static/manifest.json" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="default" />
      <meta name="apple-mobile-web-app-title" content="GA Roster" />
      <link rel="apple-touch-icon" href="/static/images/icon-192.png" />
      <meta name="theme-color" content="#74ebd5" />
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <!-- Thêm vào thẻ <head> -->

      <title>Month 7</title>
      <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
      />
      <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/home.css') }}"
      />
      <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
      <script>
        emailjs.init("ij7vRY53B5p5u2fWC"); // thay bằng Public Key của bạn
      </script>
    </head>
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    .wrap {
      width: 100%;
      height: 80vh;
      overflow: auto;
      border: 0.5px solid #dee2e6;
      border-radius: 8px;
    }
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      font-size: 13px;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #212529;
      color: #f8f9fa;
      padding: 10px 14px;
      white-space: nowrap;
      border: 1px solid #343a40;
      z-index: 2;
    }
    /* Freeze cột Shift (header) */
    thead th:first-child {
      position: sticky;
      left: 0;
      top: 0;
      z-index: 3; /* cao hơn để đè cả ngang lẫn dọc */
      background: #212529;
    }
    tbody td {
      padding: 8px 14px;
      border: 1px solid #dee2e6;
      white-space: nowrap;
    }
    /* Freeze cột Shift (body) */
    tbody td:first-child {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #f8f9fa;
      font-weight: 500;
      border-right: 2px solid #adb5bd;
    }
    tbody tr:nth-child(even) td {
      background: #f2f2f2;
    }
    tbody tr:nth-child(even) td:first-child {
      background: #e9ecef;
    }
    tbody tr:hover td {
      background: #dbeafe;
    }
    thead th {
      background: rgba(33, 37, 41, 0.85);
      backdrop-filter: blur(4px);
    }

    tbody td {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(2px);
    }

    tbody td:first-child {
      background: rgba(248, 249, 250, 0.85);
    }

    tbody tr:nth-child(even) td {
      background: rgba(242, 242, 242, 0.75);
    }

    tbody tr:nth-child(even) td:first-child {
      background: rgba(233, 236, 239, 0.85);
    }

    tbody tr:hover td {
      background: rgba(219, 234, 254, 0.85);
    }
    tbody td {
      padding: 4px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    thead th {
      padding: 6px 8px;
      font-size: 11px;
      white-space: nowrap;
    }
  </style>
  <body>
    <div class="wrap">
      <table>
        <thead>
          <tr>
            {% for col in columns %}
            <th>{{ col }}</th>
            {% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for row in data %}
          <tr>
            {% for col in columns %} {% set val = row.get(col, '') %}
            <td>{{ '' if val is none or val|string == 'nan' else val }}</td>
            {% endfor %}
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
