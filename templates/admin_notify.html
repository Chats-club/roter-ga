<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin – Send Notification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="p-4" style="background: linear-gradient(135deg,#74ebd5,#9face6); min-height:100vh">
  <div class="container" style="max-width:500px">
    <div class="card shadow p-4">
      <h4 class="mb-1">🔔 Send Notification</h4>
      <p class="text-muted mb-3">
        Total subscribers: <strong>{{ total }}</strong>
      </p>

      {% if success %}
      <div class="alert alert-success">
        ✅ Sent to <strong>{{ sent }}</strong> devices!
      </div>
      {% endif %}

      <form method="POST" action="/admin/notify">
        <div class="mb-3">
          <label class="form-label fw-bold">Title</label>
          <input
            name="title"
            class="form-control"
            placeholder="e.g. Shift Update"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Message</label>
          <textarea
            name="body"
            class="form-control"
            rows="4"
            placeholder="e.g. Ca ngày mai có thay đổi, vui lòng kiểm tra roster!"
            required
          ></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          🚀 Send to All Staff
        </button>
      </form>

      <a href="/" class="btn btn-outline-secondary w-100 mt-2">← Back to Home</a>
    </div>
  </div>
</body>
</html>
