<!doctype html>
<html lang="en">
  <head>
    <link rel="manifest" href="/static/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GA Roster" />
    <link rel="apple-touch-icon" href="/static/images/icon-192.png" />
    <meta name="vapid-key" content="{{ vapid_public_key }}" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/home.css') }}"
    />
    <title>GA Roster</title>
    <style>
      body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
      }
      .hero {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
      }
      .card-month {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        transition: all 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        color: white;
      }
      .card-month:hover {
        background: rgba(255, 255, 255, 0.18);
        transform: translateY(-6px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        color: white;
      }
      .badge-month {
        background: linear-gradient(135deg, #f093fb, #f5576c);
        font-size: 1.25rem;
        border-radius: 20px;
        padding: 4px 12px;
        margin: 0;
        line-height: 1;
      }
      .icon-box {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
      }
      .divider {
        border-color: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container" style="max-width: 700px">
      <!-- Hero Header -->
      <div class="hero text-white text-center p-5 mb-4">
        <div
          class="mb-3 d-flex justify-content-between align-items-center px-2"
        >
          <span class="badge badge-month text-white"
            >International Tourist Club</span
          >
          <!-- Thêm notification -->
          <button onclick="subscribePush()" class="filter-btn" id="notifyBtn">
            🔔
          </button>
        </div>
        <h1 class="fw-bold fs-2 mb-1">Game Ambassador Roster</h1>
        <p class="text-white-50 mb-0">
          Manage and view monthly ambassador data
        </p>
      </div>

      <!-- Month Cards -->
      <div class="row g-3 mb-4">
        <div class="col-12">
          <a
            href="/month7"
            class="card-month d-flex align-items-center p-4 gap-3"
            onclick="
              speakAndGo(
                event,
                'Welcome you to month seven roster. Happy working day',
                '/month7',
              )
            "
          >
            <div
              class="icon-box"
              style="background: linear-gradient(135deg, #667eea, #764ba2)"
            >
              📅
            </div>
            <div class="flex-grow-1">
              <div class="fw-semibold fs-5">Roster Month 7</div>
              <div class="text-white-50 small">View July ambassador list</div>
            </div>
            <i class="bi bi-chevron-right text-white-50"></i>
          </a>
        </div>

        <div class="col-12">
          <a
            href="/month8"
            class="card-month d-flex align-items-center p-4 gap-3 disabled-link"
          >
            <div
              class="icon-box"
              style="background: linear-gradient(135deg, #f093fb, #f5576c)"
            >
              📅
            </div>
            <div class="flex-grow-1">
              <div class="fw-semibold fs-5">Roster Month 8</div>
              <div class="text-white-50 small">View August ambassador list</div>
            </div>
            <i class="bi bi-chevron-right text-white-50"></i>
          </a>
        </div>

        <div class="col-12">
          <a
            href="/month9"
            class="card-month d-flex align-items-center p-4 gap-3 disabled-link"
          >
            <div
              class="icon-box"
              style="background: linear-gradient(135deg, #4facfe, #00f2fe)"
            >
              📅
            </div>
            <div class="flex-grow-1">
              <div class="fw-semibold fs-5">Roster Month 9</div>
              <div class="text-white-50 small">
                View September ambassador list
              </div>
            </div>
            <i class="bi bi-chevron-right text-white-50"></i>
          </a>
        </div>
      </div>

      <!-- Footer -->
      <hr class="divider" />
      <p class="text-center text-white-50 small mb-0">
        © 2026 International Tourist Club · GA Roster System
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const VAPID_PUBLIC_KEY = document.querySelector(
        'meta[name="vapid-key"]',
      ).content;

      function urlBase64ToUint8Array(base64String) {
        const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding)
          .replace(/-/g, "+")
          .replace(/_/g, "/");
        const rawData = atob(base64);
        return Uint8Array.from([...rawData].map((c) => c.charCodeAt(0)));
      }
      // ── Push Notification Subscribe ──────────────────
      async function subscribePush() {
        if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
          alert("Browser không hỗ trợ push notification");
          return;
        }

        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          alert("Bạn cần Allow notification!");
          return;
        }

        const reg =
          await navigator.serviceWorker.register("/service-worker.js");
        await navigator.serviceWorker.ready;

        const subscription = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
        });

        await fetch("/api/subscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(subscription.toJSON()),
        });

        // Đổi nút sau khi subscribe thành công
        document.getElementById("notifyBtn").textContent = "🔔 ON";
        document.getElementById("notifyBtn").disabled = true;
      }

      // Xóa dòng này ↓
      // window.addEventListener("load", subscribePush);
      //Tinh nang chuyen trang khi noi
      function speakAndGo(event, text, url) {
        event.preventDefault();

        if (!window.speechSynthesis) {
          window.location.href = url;
          return;
        }

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);

        // Tối ưu hóa giọng đọc
        const voices = window.speechSynthesis.getVoices();
        // Ưu tiên chọn giọng Google hoặc giọng có tên "English"
        const targetVoice =
          voices.find((v) => v.name.includes("Google US English")) ||
          voices.find((v) => v.lang === "en-US");
        if (targetVoice) utterance.voice = targetVoice;

        utterance.lang = "en-US"; // Dùng en-US thay vì en-EN
        utterance.rate = 0.95; // Giảm tốc độ xuống một chút (1.1 thường quá nhanh gây mất tự nhiên)
        utterance.pitch = 1; // Giữ nguyên hoặc điều chỉnh nhẹ (0.8 - 1.2)

        utterance.onend = () => {
          window.location.href = url;
        };

        // Xử lý lỗi nếu giọng không load kịp
        setTimeout(() => {
          if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
          window.location.href = url;
        }, 5000);

        window.speechSynthesis.speak(utterance);
      }

      // Lưu ý: Cần đợi sự kiện 'voiceschanged' để đảm bảo danh sách giọng đã load xong
      window.speechSynthesis.onvoiceschanged = () => {
        // Có thể lưu lại danh sách giọng vào biến global nếu cần
      };
    </script>
  </body>
</html>
