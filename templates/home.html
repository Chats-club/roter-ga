<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='home.css') }}"
    />
    <title>GA Roster</title>
    <style>
      body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
      }
      .hero {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
      }
      .card-month {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        transition: all 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        color: white;
      }
      .card-month:hover {
        background: rgba(255, 255, 255, 0.18);
        transform: translateY(-6px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        color: white;
      }
      .badge-month {
        background: linear-gradient(135deg, #f093fb, #f5576c);
        font-size: 0.75rem;
        border-radius: 20px;
        padding: 4px 12px;
      }
      .icon-box {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
      }
      .divider {
        border-color: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container" style="max-width: 700px">
      <!-- Hero Header -->
      <div class="hero text-white text-center p-5 mb-4">
        <div class="mb-3">
          <span class="badge badge-month text-white mb-2"
            >International Tourist Club</span
          >
        </div>
        <h1 class="fw-bold fs-2 mb-1">Game Ambassador Roster</h1>
        <p class="text-white-50 mb-0">
          Manage and view monthly ambassador data
        </p>
      </div>

      <!-- Month Cards -->
      <div class="row g-3 mb-4">
        <div class="col-12">
          <a
            href="/month7"
            class="card-month d-flex align-items-center p-4 gap-3"
          >
            <div
              class="icon-box"
              style="background: linear-gradient(135deg, #667eea, #764ba2)"
            >
              📅
            </div>
            <div class="flex-grow-1">
              <div class="fw-semibold fs-5">Roster Month 7</div>
              <div class="text-white-50 small">View July ambassador list</div>
            </div>
            <i class="bi bi-chevron-right text-white-50"></i>
          </a>
        </div>

        <div class="col-12">
          <a
            href="/month8"
            class="card-month d-flex align-items-center p-4 gap-3 disabled-link"
          >
            <div
              class="icon-box"
              style="background: linear-gradient(135deg, #f093fb, #f5576c)"
            >
              📅
            </div>
            <div class="flex-grow-1">
              <div class="fw-semibold fs-5">Roster Month 8</div>
              <div class="text-white-50 small">View August ambassador list</div>
            </div>
            <i class="bi bi-chevron-right text-white-50"></i>
          </a>
        </div>

        <div class="col-12">
          <a
            href="/month9"
            class="card-month d-flex align-items-center p-4 gap-3 disabled-link"
          >
            <div
              class="icon-box"
              style="background: linear-gradient(135deg, #4facfe, #00f2fe)"
            >
              📅
            </div>
            <div class="flex-grow-1">
              <div class="fw-semibold fs-5">Roster Month 9</div>
              <div class="text-white-50 small">
                View September ambassador list
              </div>
            </div>
            <i class="bi bi-chevron-right text-white-50"></i>
          </a>
        </div>
      </div>

      <!-- Footer -->
      <hr class="divider" />
      <p class="text-center text-white-50 small mb-0">
        © 2026 International Tourist Club · GA Roster System
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
