<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Lịch sử tháng 7</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .table td, .table th { font-size: 2.1rem; vertical-align: middle; }
    .table tbody tr:hover { background-color: #f1f3f5; }
    .time-cell { color: #6b7280; font-family: monospace; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container py-4" style="max-width: 750px;">

    <!-- Header -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="/month7" class="btn btn-secondary btn-sm">← Back</a>
      <h2 class="mb-0">📋 Lịch sử tháng 7</h2>
    </div>

    <!-- Form -->
    <form method="POST" class="d-flex gap-2 mb-4">
      <input type="text" name="text" placeholder="Nhập ghi chú..." required
             class="form-control">
      <button type="submit" class="btn btn-primary px-4">Thêm</button>
    </form>

    <!-- Table -->
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th style="width: 180px;">Thời gian</th>
              <th>Nội dung</th>
            </tr>
          </thead>
          <tbody>
            {% for row in data %}
            <tr>
              <td class="time-cell">{{ row.time }}</td>
              <td>{{ row.text }}</td>
            </tr>
            {% else %}
            <tr>
              <td colspan="2" class="text-center text-muted py-4">Chưa có dữ liệu.</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>

  </div>
</body>
</html>
