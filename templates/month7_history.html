<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lịch sử tháng 7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            navy: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 px-4 py-10">

  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
      <a href="/month7"
         class="text-slate-400 hover:text-white transition text-sm flex items-center gap-1 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg">
        ← Back
      </a>
      <h1 class="text-xl font-semibold tracking-tight">📋 Lịch sử tháng 7</h1>
    </div>

    <!-- Form -->
    <form method="POST" class="flex gap-3 mb-8">
      <input
        type="text"
        name="text"
        placeholder="Nhập ghi chú..."
        required
        class="flex-1 bg-slate-800 border border-slate-700 text-slate-100 placeholder-slate-500
               rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
      >
      <button type="submit"
              class="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white text-sm font-medium
                     px-5 py-2.5 rounded-xl transition">
        Thêm
      </button>
    </form>

    <!-- Table -->
    <div class="bg-slate-800/60 border border-slate-700 rounded-2xl overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-700 bg-slate-800">
            <th class="text-left px-5 py-3 text-slate-400 font-medium w-40">Thời gian</th>
            <th class="text-left px-5 py-3 text-slate-400 font-medium">Nội dung</th>
          </tr>
        </thead>
        <tbody>
          {% for row in data %}
          <tr class="border-b border-slate-700/50 hover:bg-slate-700/30 transition">
            <td class="px-5 py-3 text-slate-500 whitespace-nowrap font-mono text-xs">{{ row.time }}</td>
            <td class="px-5 py-3 text-slate-200">{{ row.text }}</td>
          </tr>
          {% else %}
          <tr>
            <td colspan="2" class="px-5 py-10 text-center text-slate-500">
              Chưa có dữ liệu.
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

  </div>
</body>
</html>
