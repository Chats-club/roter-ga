<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Lịch sử tháng 7</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 16px;
      }
      form {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }
      input[type="text"] {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      button {
        padding: 8px 16px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #e5e7eb;
      }
      th {
        background: #f3f4f6;
        font-weight: 600;
      }
      tr:hover td {
        background: #f9fafb;
      }
      .empty {
        color: #9ca3af;
        text-align: center;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <h2>📋 Lịch sử tháng 7</h2>
    <a
      href="/month7"
      style="
        display: inline-block;
        margin-bottom: 16px;
        padding: 7px 16px;
        background: #6b7280;
        color: #fff;
        border-radius: 6px;
        text-decoration: none;
        font-size: 14px;
      "
      >← Back</a
    >
    <form method="POST">
      <input type="text" name="text" placeholder="Nhập ghi chú..." required />
      <button type="submit">Thêm</button>
    </form>

    <table class="w-full text-base">
      <thead>
        <tr>
          <th>Thời gian</th>
          <th>Nội dung</th>
        </tr>
      </thead>
      <tbody>
        {% for row in data %}
        <tr>
          <td
            class="px-5 py-3 text-slate-500 whitespace-nowrap font-mono text-base"
          >
            {{ row.time }}
          </td>
          <td class="px-5 py-3 text-slate-200 text-base">{{ row.text }}</td>
        </tr>
        {% else %}
        <tr>
          <td colspan="2" class="empty">Chưa có dữ liệu.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
