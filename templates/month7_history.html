<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Month7-History</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="p-4">
    <div class="container">
      <h2 class="mb-4 text-center">📋 Month 7 Request History</h2>

      <a href="/month7" class="btn btn-secondary mb-3">← Back</a>

      <ul class="list-group">
        {% for item in data %}
        <li class="list-group-item">
          <span class="text-muted small">[{{ item.time }}]</span>
          <span class="ms-2">{{ item.text }}</span>
        </li>
        {% endfor %}
      </ul>
    </div>
  </body>
</html>
