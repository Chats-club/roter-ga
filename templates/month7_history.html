<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Lịch sử tháng 7</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: whitesmoke;
        color: #111;
      }

      .history-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .history-row {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 16px;
        padding: 12px;
      }

      .time-box {
        min-width: 130px;
        border: 1px solid #ccc;
        border-radius: 12px;
        padding: 10px 14px;
        font-family: monospace;
        font-size: 1.8rem;
        color: #444;
        text-align: center;
        line-height: 1.5;
        background: #f3f4f6;
      }

      .text-box {
        flex: 1;
        border: 1px solid #ccc;
        border-radius: 12px;
        padding: 10px 16px;
        font-size: 1.8rem;
        background: #f3f4f6;
        color: #111;
      }

      .section-label {
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 6px 20px;
        font-size: 1rem;
        color: #555;
        background: #fff;
      }

      .section-label {
        border: 1px solid #444;
        border-radius: 10px;
        padding: 6px 20px;
        font-size: 1rem;
        color: #ccc;
        background: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <div class="container py-4" style="max-width: 850px">
      <!-- Header -->
      <div class="d-flex align-items-center gap-3 mb-4">
        <a href="/month7" class="btn btn-secondary">← Back</a>
        <h1 class="mb-0">📋 Lịch sử tháng 7</h1>
      </div>

      <form method="POST" class="d-flex gap-2 mb-4">
        <input
          type="text"
          name="text"
          placeholder="Nhập ghi chú..."
          required
          class="form-control form-control-lg"
        />
        <button type="submit" class="btn btn-primary btn-lg px-4">Thêm</button>
      </form>

      <!-- Column Labels -->
      <div class="d-flex gap-3 mb-3 px-1">
        <div class="section-label" style="min-width: 130px; text-align: center">
          Thời gian
        </div>
        <div class="section-label flex-1">Nội dung</div>
      </div>

      <!-- Rows -->
      <div class="history-list">
        {% for row in data %}
        <div class="history-row">
          <div class="time-box">{{ row.time }}</div>
          <div class="text-box">{{ row.text }}</div>
        </div>
        {% else %}
        <div class="text-center text-muted py-4">Chưa có dữ liệu.</div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
